<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <script defer th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <title>Generated Problems</title>
</head>
<body>
<header th:replace="~{problems/problems-index :: problems-header}"></header>
<main class="container">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/index}">Index</a></li>
            <li class="breadcrumb-item"><a th:href="@{/problems}">Problems</a></li>
            <li class="breadcrumb-item"><a th:href="@{/problems/categories}">Categories</a></li>
            <li class="breadcrumb-item"><a th:href="@{/problems/categories/{c}(c=${category})}"
                                           th:text="${#strings.capitalize(category)}">Specific Category</a></li>
            <li class="breadcrumb-item active" aria-current="page">Generated Problems</li>
        </ol>
    </nav>
    <h2 class="mb-4 mb-3">Generated Problems</h2>
    <ul>
        <li>Category: <span th:text="${#strings.capitalize(category)}" class="value">Category</span>
        </li>
        <li>Difficulty Level:
            <span th:text="${#strings.capitalize(level)}" class="value">Level</span>
        </li>
        <li>Number of Problems:
            <span th:text="${problems.size()}" class="value">Number</span>
        </li>
    </ul>
    <div class="table-and-form-container">
    <table class="table table-striped table-bordered w-auto">
        <thead>
        <tr class="table-primary">
            <th>Count</th>
            <th>Problem</th>
            <th>Answer</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="problem, status : ${problems}">
            <td th:text="${status.count}">Count</td>
            <td th:text="${problem.text}">Problem</td>
            <td th:text="${problem.answer}">Answer</td>
        </tr>
        </tbody>
    </table>
    <form th:action="@{/problems/generator}" method="get">
        <input type="hidden" name="category" th:value="${category}">
        <input type="hidden" name="level" th:value="${level}">
        <input type="hidden" name="number" th:value="${problems.size()}">
        <button type="submit" class="btn btn-primary mt-3">Repeat Generation</button>
    </form>
    </div>
</main>
<footer th:replace="~{home/home-index :: course-footer}">Some Footer</footer>
</body>
</html>
